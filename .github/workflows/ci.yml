name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      # Build with no secrets: Supabase and Anthropic are optional, so the app
      # builds in demo-fallback mode. NEXT_TELEMETRY_DISABLED keeps CI quiet.
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
